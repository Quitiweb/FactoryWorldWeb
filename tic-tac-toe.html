<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe · Game Quitiweb</title>
  <link rel="icon" href="./favicon.ico">
  <style>
    :root{--bg:#0a1222;--panel:#121d34;--line:#30476f;--text:#eff5ff;--muted:#9bb0d2;--accent:#7c3aed;--accent2:#22d3ee;--x:#f97316;--o:#34d399}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:radial-gradient(circle at top,#1c2f53,#0a1222 65%);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px}
    .wrap{width:min(100%,720px)}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.back{padding:10px 12px;border-radius:12px;border:1px solid var(--line);color:var(--text);text-decoration:none;background:#0f1930}.card{background:linear-gradient(180deg,#14203a,#0f1930);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 16px 34px rgba(0,0,0,.25)}
    h1{margin:.2em 0}.muted{color:var(--muted)}.status{margin:14px 0 20px;padding:14px;border-radius:14px;background:#0c1730;border:1px solid #243a63;font-weight:700}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cell{aspect-ratio:1/1;border:none;border-radius:18px;background:#0c1730;border:1px solid #27416d;color:#fff;font-size:clamp(2.3rem,10vw,4rem);font-weight:800;cursor:pointer;transition:.15s transform,.15s background}.cell:hover{transform:translateY(-2px);background:#122242}.cell:disabled{cursor:not-allowed;opacity:.95}.cell.x{color:var(--x)}.cell.o{color:var(--o)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#06111c;font-weight:800;cursor:pointer}.btn.secondary{background:#0c1730;border:1px solid #294270;color:var(--text)}
    .score{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.score div{background:#0c1730;border:1px solid #27416d;border-radius:14px;padding:12px}.score strong{display:block;font-size:1.3rem}
    @media(max-width:520px){.card{padding:16px}.board{gap:8px}.status{font-size:.95rem}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="./index.html">← Galería</a>
      <div class="muted">Humano vs máquina</div>
    </div>
    <div class="card">
      <h1>Tic Tac Toe</h1>
      <p class="muted">Tú juegas con <strong>X</strong>. La máquina juega con <strong>O</strong>. Si puede ganar, gana; si no, intenta bloquearte.</p>
      <div class="status" id="status">Tu turno.</div>
      <div class="board" id="board"></div>
      <div class="actions">
        <button class="btn" id="resetBtn">Nueva partida</button>
        <button class="btn secondary" id="machineBtn">Que empiece la máquina</button>
      </div>
      <div class="score">
        <div><span class="muted">Humano</span><strong id="scoreHuman">0</strong></div>
        <div><span class="muted">Empates</span><strong id="scoreDraw">0</strong></div>
        <div><span class="muted">Máquina</span><strong id="scoreMachine">0</strong></div>
      </div>
    </div>
  </div>

  <script>
    const HUMAN = 'X';
    const AI = 'O';
    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const scoreHumanEl = document.getElementById('scoreHuman');
    const scoreDrawEl = document.getElementById('scoreDraw');
    const scoreMachineEl = document.getElementById('scoreMachine');

    let board = Array(9).fill('');
    let gameOver = false;
    let humanStarts = true;
    let scores = { human: 0, draw: 0, ai: 0 };

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((value, index) => {
        const btn = document.createElement('button');
        btn.className = `cell ${value === 'X' ? 'x' : value === 'O' ? 'o' : ''}`;
        btn.textContent = value;
        btn.disabled = Boolean(value) || gameOver;
        btn.addEventListener('click', () => handleHumanMove(index));
        boardEl.appendChild(btn);
      });
    }

    function setStatus(text) { statusEl.textContent = text; }

    function checkWinner(state) {
      for (const [a,b,c] of WINNING_LINES) {
        if (state[a] && state[a] === state[b] && state[a] === state[c]) return state[a];
      }
      return state.every(Boolean) ? 'draw' : null;
    }

    function findBestMove(state, player) {
      const winner = checkWinner(state);
      if (winner === AI) return { score: 1 };
      if (winner === HUMAN) return { score: -1 };
      if (winner === 'draw') return { score: 0 };

      const moves = [];
      state.forEach((cell, index) => {
        if (!cell) {
          const next = [...state];
          next[index] = player;
          const result = findBestMove(next, player === AI ? HUMAN : AI);
          moves.push({ index, score: result.score });
        }
      });

      if (player === AI) {
        return moves.reduce((best, move) => move.score > best.score ? move : best, { score: -Infinity });
      }
      return moves.reduce((best, move) => move.score < best.score ? move : best, { score: Infinity });
    }

    function finishRound(result) {
      gameOver = true;
      if (result === HUMAN) {
        scores.human += 1; setStatus('Has ganado 🎉');
      } else if (result === AI) {
        scores.ai += 1; setStatus('La máquina gana.');
      } else {
        scores.draw += 1; setStatus('Empate.');
      }
      scoreHumanEl.textContent = scores.human;
      scoreDrawEl.textContent = scores.draw;
      scoreMachineEl.textContent = scores.ai;
      renderBoard();
    }

    function handleHumanMove(index) {
      if (board[index] || gameOver) return;
      board[index] = HUMAN;
      renderBoard();
      const result = checkWinner(board);
      if (result) return finishRound(result);
      setStatus('Turno de la máquina…');
      window.setTimeout(handleAiMove, 260);
    }

    function handleAiMove() {
      if (gameOver) return;
      const bestMove = findBestMove(board, AI).index;
      if (bestMove === undefined) return;
      board[bestMove] = AI;
      renderBoard();
      const result = checkWinner(board);
      if (result) return finishRound(result);
      setStatus('Tu turno.');
    }

    function resetBoard(machineStarts = false) {
      board = Array(9).fill('');
      gameOver = false;
      renderBoard();
      if (machineStarts) {
        setStatus('Empieza la máquina…');
        window.setTimeout(handleAiMove, 250);
      } else {
        setStatus('Tu turno.');
      }
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      humanStarts = true;
      resetBoard(false);
    });
    document.getElementById('machineBtn').addEventListener('click', () => {
      humanStarts = false;
      resetBoard(true);
    });

    renderBoard();
  </script>
</body>
</html>
